<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Location — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Fira Sans',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:#1a1a1a;border:2px solid #12a312;border-radius:10px;padding:32px;width:420px;box-shadow:0 0 30px rgba(18,163,18,.3);}
h1{color:#66ffb2;font-size:20px;margin-bottom:6px;letter-spacing:1px;}
p{color:#666;font-size:13px;margin-bottom:24px;}
label{color:#bdbdbd;font-size:11px;letter-spacing:1px;display:block;margin-bottom:6px;}
input{width:100%;background:#0a0a0a;border:1px solid rgba(18,163,18,.5);border-radius:6px;color:#66ffb2;font-family:'Fira Sans',sans-serif;font-size:14px;padding:12px;outline:none;margin-bottom:16px;transition:border-color .2s;}
input::placeholder{color:rgba(102,255,178,.25);}
input:focus{border-color:#12a312;box-shadow:0 0 10px rgba(18,163,18,.3);}
button{width:100%;background:rgba(18,163,18,.25);border:2px solid #12a312;border-radius:6px;color:#66ffb2;font-family:'Fira Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;padding:14px;cursor:pointer;transition:background .2s;}
button:hover{background:rgba(18,163,18,.45);}
button:active{background:rgba(18,163,18,.65);}
button:disabled{opacity:.4;cursor:not-allowed;}
.msg{margin-top:16px;font-size:13px;text-align:center;min-height:20px;letter-spacing:.5px;}
.msg.ok{color:#66ffb2;}
.msg.err{color:#ff6666;}
.dot{display:inline-block;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>
<body>
<div class="card">
    <h1>📍 LIVE LOCATION</h1>
    <p>Cole as coordenadas e clique em Enviar. O widget do OBS atualiza em até 30 segundos.</p>
    <label>COORDENADAS ATUAIS</label>
    <input id="coords" type="text" placeholder="39.33561787595969, -100.9938449384924" autocomplete="off"/>
    <button id="btn" onclick="enviar()">ENVIAR</button>
    <div class="msg" id="msg"></div>
</div>
<script>
const GIST_ID = "b2a52ea8a2ad4f2699b5b0efddbb0cd7";
const TOKEN = "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";

async function enviar(){
    const raw = document.getElementById("coords").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    const match = raw.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
    if(!match){
        msg.textContent = "FORMATO INVÁLIDO — use: lat, lon";
        msg.className = "msg err";
        return;
    }

    btn.disabled = true;
    btn.innerHTML = 'ENVIANDO<span class="dot">...</span>';
    msg.textContent = "";

    try{
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers:{
                "Authorization": `token ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                files:{ "coords.txt":{ content: raw } }
            })
        });

        if(r.ok){
            msg.textContent = "✓ Coordenadas enviadas com sucesso!";
            msg.className = "msg ok";
        } else {
            throw new Error("Erro na API");
        }
    }catch(e){
        msg.textContent = "ERRO ao enviar. Tente novamente.";
        msg.className = "msg err";
    }

    btn.disabled = false;
    btn.textContent = "ENVIAR";
}

document.getElementById("coords").addEventListener("keydown", e => {
    if(e.key === "Enter") enviar();
});
</script>
</body>
</html>
